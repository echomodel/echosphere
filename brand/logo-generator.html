<!DOCTYPE html>
<html>
<head><title>final v6</title></head>
<body style="margin:0;background:#0D1117;display:flex;flex-wrap:wrap;gap:40px;align-items:center;justify-content:center;min-height:100vh;padding:40px;font-family:sans-serif;color:#8B949E;">
<script>
const wrenchPath = 'M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z';
const heartPath = 'M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z';

function circuit(ctx, color) {
  ctx.strokeStyle=color;ctx.lineWidth=7;ctx.lineCap='round';ctx.globalAlpha=0.35;
  // H and V lines, asymmetric, some crossing through center
  const traces=[
    // Left side
    [[30,180],[200,180]],           // h — extends into center
    [[160,180],[160,100]],          // v up from midpoint
    [[45,350],[130,350]],           // h shorter

    // Right side
    [[310,200],[485,200]],          // h — starts inside center
    [[380,200],[380,290]],          // v down
    [[390,340],[470,340]],          // h shorter
    [[470,340],[470,410]],          // v down

    // Top
    [[200,25],[200,180]],           // v — runs all the way down into center
    [[200,25],[290,25]],            // h from top
    [[340,45],[340,170]],           // v — into center area

    // Bottom
    [[175,340],[175,480]],          // v — starts inside center
    [[175,480],[265,480]],          // h from bottom
    [[310,350],[310,465]],          // v — starts inside center

    // Cross traces — go through the middle
    [[100,256],[240,256]],          // h through left-center
    [[280,300],[420,300]],          // h through right-center
  ];
  traces.forEach(([[x1,y1],[x2,y2]])=>{ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();});
  // Dots at corners/ends
  ctx.globalAlpha=0.5;
  const dots=new Set();
  traces.forEach(([[x1,y1],[x2,y2]])=>{dots.add(x1+','+y1);dots.add(x2+','+y2);});
  dots.forEach(d=>{const[x,y]=d.split(',').map(Number);ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();});
  ctx.globalAlpha=1;
}

function glow(ctx, color) {
  const c=256;
  const gg=ctx.createRadialGradient(c,c,60,c,c,240);
  gg.addColorStop(0,color+'70');gg.addColorStop(0.5,color+'30');gg.addColorStop(1,color+'00');
  ctx.beginPath();ctx.arc(c,c,240,0,Math.PI*2);ctx.fillStyle=gg;ctx.fill();
}

function lucideIcon(ctx, pathData, color1, color2) {
  ctx.save();ctx.translate(56,56);ctx.scale(16.67,16.67);
  const p=new Path2D(pathData);
  const g=ctx.createLinearGradient(0,0,24,24);
  g.addColorStop(0,color1);g.addColorStop(1,color2);
  ctx.fillStyle=g;ctx.fill(p);ctx.restore();
}

function echomodelLogo(ctx) {
  ctx.fillStyle='#0D1117';ctx.fillRect(0,0,512,512);
  glow(ctx,'#58A6FF');
  circuit(ctx,'#58A6FF');
  const c=256;
  ctx.beginPath();ctx.arc(c,c,185,0,Math.PI*2);
  ctx.strokeStyle='#388BFD';ctx.lineWidth=4;ctx.globalAlpha=0.25;ctx.stroke();
  ctx.globalAlpha=1;
  const g=ctx.createRadialGradient(c-22,c-22,10,c,c,135);
  g.addColorStop(0,'#A5D6FF');g.addColorStop(0.4,'#58A6FF');g.addColorStop(0.8,'#1A5FB4');g.addColorStop(1,'#1A4F8A');
  ctx.beginPath();ctx.arc(c,c,135,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  const gc=ctx.createRadialGradient(c,c,0,c,c,30);
  gc.addColorStop(0,'#FFF');gc.addColorStop(0.6,'#A5D6FF');gc.addColorStop(1,'rgba(88,166,255,0)');
  ctx.beginPath();ctx.arc(c,c,30,0,Math.PI*2);ctx.fillStyle=gc;ctx.fill();
}

function echoskillLogo(ctx) {
  ctx.fillStyle='#0D1117';ctx.fillRect(0,0,512,512);
  glow(ctx,'#3FB9CF');
  circuit(ctx,'#5ED4E6');
  lucideIcon(ctx,wrenchPath,'#5ED4E6','#1F8494');
}

function echofitLogo(ctx) {
  ctx.fillStyle='#0D1117';ctx.fillRect(0,0,512,512);
  glow(ctx,'#DA70D6');
  circuit(ctx,'#F0A0E0');
  lucideIcon(ctx,heartPath,'#F0A0E0','#8B2F8B');
}

const logos=[
  {draw:echomodelLogo,label:'echomodel',file:'echomodel-logo-512.png'},
  {draw:echoskillLogo,label:'echoskill',file:'echoskill-logo-512.png'},
  {draw:echofitLogo,label:'echofit',file:'echofit-logo-512.png'},
];

logos.forEach(({draw,label,file},i)=>{
  const wrap=document.createElement('div');wrap.style.textAlign='center';
  const canvas=document.createElement('canvas');canvas.width=512;canvas.height=512;
  canvas.style.cssText='width:250px;height:250px;border:1px solid #30363D;border-radius:12px;';
  draw(canvas.getContext('2d'));canvas.id='c'+i;
  const p=document.createElement('p');p.style.cssText='margin-top:8px;font-size:14px;';p.textContent=label;
  const btn=document.createElement('button');btn.textContent='Download';
  btn.style.cssText='margin-top:6px;padding:6px 12px;cursor:pointer;background:#161B22;color:#ccc;border:1px solid #30363D;border-radius:6px;';
  btn.onclick=()=>{const a=document.createElement('a');a.download=file;a.href=canvas.toDataURL('image/png');a.click();};
  wrap.appendChild(canvas);wrap.appendChild(p);wrap.appendChild(btn);document.body.appendChild(wrap);
});
</script>
</body>
</html>
